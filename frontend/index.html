<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가늠터 — AI 건축 인허가 사전검토</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="./colors_and_type.css" />
<link rel="stylesheet" href="./nav_app.css" />
<style>
  .think-step.dim { opacity: 0.7; font-size: 13.5px; }
  .think-step.dim .tk { background: var(--sky-200); }
  .verdict-card .bsrc.bsrc-none { color: oklch(0.45 0.14 25); background: var(--danger-bg); }
  .verdict-card .bsrc.bsrc-site { color: var(--warm-fg); background: var(--warm-bg); }
  .verdict-card .bsrc.bsrc-law { color: var(--sky-700); background: var(--sky-50); }
  .verdict-card .cite-meta { font-size: 12px; color: var(--fg-3); margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-1); }
  .verdict-card .basis-wrap .basis-item:last-child { border-bottom: none; }

  /* ── 채팅: 접힌 "검토 중" 상태 버블(현재 단계 1줄만 subtle) ── */
  .thinking-bubble { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; max-width: 600px; }
  .thinking-bubble .think-spin { width: 16px; height: 16px; border-radius: 999px; border: 2.5px solid var(--sky-200); border-top-color: var(--sky-600); animation: spin 0.8s linear infinite; flex-shrink: 0; }
  .thinking-bubble .tb-t { font-weight: 700; color: var(--fg-2); }
  .thinking-bubble .tb-step { font-size: 13px; color: var(--fg-3); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── 채팅: AI 답변 메시지(판정 한 줄 + 대화체 요약 + '자세히 보기' 1개) ── */
  .answer-msg { max-width: 600px; width: 100%; border: 1.5px solid var(--border-1); border-radius: 15px; border-top-left-radius: 5px; background: var(--bg-surface); padding: 15px 17px; }
  .answer-msg.go { border-color: color-mix(in srgb, var(--success) 35%, var(--border-1)); }
  .answer-msg.cond { border-color: color-mix(in srgb, var(--warm) 38%, var(--border-1)); }
  .answer-msg .am-head { display: flex; align-items: flex-start; gap: 11px; }
  .answer-msg .am-sig { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .answer-msg.go .am-sig { background: var(--success); } .answer-msg.cond .am-sig { background: var(--warm); } .answer-msg.check .am-sig { background: var(--sky-500); }
  .answer-msg .am-verdict { font-size: 16px; font-weight: 600; line-height: 1.5; letter-spacing: -0.01em; color: var(--fg-1); padding-top: 4px; }
  .answer-msg .am-verdict b { font-weight: 800; }
  .answer-msg .am-body { margin-top: 11px; display: flex; flex-direction: column; gap: 5px; }
  .answer-msg .am-line { font-size: 14.5px; line-height: 1.6; color: var(--fg-2); }
  .answer-msg .am-line b { font-weight: 700; color: var(--fg-1); }
  .answer-msg .am-open { display: inline-flex; align-items: center; gap: 7px; margin-top: 13px; border: none; border-radius: 11px; padding: 10px 15px; font-size: 14px; font-weight: 700; color: #fff; background: var(--sky-500); transition: background var(--t-fast) var(--ease-out); }
  .answer-msg .am-open:hover { background: var(--sky-600); }
  .answer-msg .am-open:focus-visible { outline: none; box-shadow: var(--ring-focus); }
  .answer-msg .am-open.open { background: var(--sky-600); }
  .answer-msg .am-detail { margin-top: 14px; display: flex; flex-direction: column; gap: 11px; border-top: 1px solid var(--border-1); padding-top: 14px; }
  .answer-msg .am-detail[hidden] { display: none; }
  .answer-msg .am-detail .card, .answer-msg .am-detail .verdict-card { max-width: 100%; }
  .think-done { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 14px; font-weight: 700; color: var(--fg-2); }
  .think-done .am-open, .thinking-bubble .am-open { margin-top: 0; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--sky-600); background: var(--sky-50); border: 1px solid var(--sky-200); border-radius: 9px; display: inline-flex; align-items: center; gap: 6px; transition: background var(--t-fast) var(--ease-out); }
  .think-done .am-open:hover, .thinking-bubble .am-open:hover { background: var(--sky-100); }

  /* ── 우측 결과 패널 (ChatGPT 캔버스식 슬라이드) ── */
  .rp-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.32); z-index: 110; opacity: 0; pointer-events: none; transition: opacity var(--t-base) var(--ease-out); }
  .rp-backdrop.show { opacity: 1; pointer-events: auto; }
  .result-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(480px, 42vw); max-width: 100vw; background: var(--bg-page); border-left: 1px solid var(--border-1); box-shadow: -16px 0 44px rgba(15,23,42,0.16); z-index: 120; display: flex; flex-direction: column; transform: translateX(100%); transition: transform var(--t-base) var(--ease-out); }
  .result-panel.open { transform: translateX(0); }
  .rp-head { flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border-1); background: color-mix(in srgb, var(--bg-surface) 90%, transparent); backdrop-filter: blur(6px); }
  .rp-head .rp-ic { width: 36px; height: 36px; border-radius: 10px; background: var(--sky-50); color: var(--sky-600); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .rp-head .rp-meta { flex: 1; min-width: 0; }
  .rp-head .rp-t { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.3; }
  .rp-head .rp-s { font-size: 12px; color: var(--fg-3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rp-head .rp-x { width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border-1); background: var(--bg-surface); color: var(--fg-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .rp-head .rp-x:hover { background: var(--neutral-100); }
  .rp-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .rp-body::-webkit-scrollbar { width: 10px; } .rp-body::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 5px; }
  .rp-body .card, .rp-body .verdict-card { max-width: 100%; }
  .rp-sec-h { font-size: 12.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-3); padding: 4px 2px 0; display: flex; align-items: center; gap: 7px; }

  /* ── 서류: 단계 카드 + 호별 체크리스트 + 목 들여쓰기 ── */
  .doc-stage { border: 1px solid var(--border-1); border-radius: 14px; background: var(--bg-surface); overflow: hidden; }
  .doc-stage + .doc-stage { margin-top: 10px; }
  .ds-head { display: flex; align-items: flex-start; gap: 11px; padding: 14px 16px; }
  .ds-num { width: 28px; height: 28px; border-radius: 999px; background: var(--sky-500); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .doc-stage.na .ds-num { background: var(--warm); }
  .ds-num-u { width: auto !important; padding: 0 9px; border-radius: 8px !important; font-size: 10.5px; background: var(--warm-bg) !important; color: var(--warm-fg) !important; }
  .ds-main { flex: 1; min-width: 0; }
  .ds-t { font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.3; }
  .ds-law { font-size: 12.5px; color: var(--fg-3); margin-top: 3px; line-height: 1.45; }
  .ds-badge { font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; }
  .ds-badge.ok { background: var(--success-bg); color: oklch(0.34 0.10 150); }
  .ds-badge.na { background: var(--warm-bg); color: var(--warm-fg); }
  /* 단계 시점·의미 — 건축법 본법 근거, hover시 원문 인용 */
  .ds-when { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin: -6px 16px 0 55px; padding-bottom: 12px; font-size: 12.5px; line-height: 1.5; }
  .ds-when-lbl { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; color: var(--sky-700); background: var(--sky-50); border-radius: 5px; padding: 2px 7px; flex-shrink: 0; }
  .ds-when-t { color: var(--fg-2); font-weight: 600; }
  .ds-when-u .ds-when-t { color: var(--fg-3); font-weight: 500; }
  .ds-when-law { font-size: 11px; color: var(--fg-3); }
  .ds-when-src { position: relative; cursor: help; color: var(--sky-700); font-size: 11.5px; font-weight: 600; border-bottom: 1px dotted var(--sky-600); outline: none; }
  .ds-when-src .ds-pop { display: none; position: absolute; left: 0; top: calc(100% + 7px); z-index: 40; width: 320px; max-width: 74vw; background: var(--bg-surface); color: var(--fg-1); border: 1px solid var(--border-2); border-radius: 10px; padding: 11px 13px; font-size: 12px; font-weight: 400; line-height: 1.6; box-shadow: var(--shadow-3); white-space: normal; }
  .ds-when-src .ds-pop::before { content: "건축법 본법 원문"; display: block; font-size: 9.5px; font-weight: 800; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 5px; }
  .ds-when-src:hover .ds-pop, .ds-when-src:focus .ds-pop { display: block; }
  /* 작성주체(법령근거) */
  .ds-author { display: flex; align-items: baseline; gap: 7px; margin: -2px 16px 10px 55px; font-size: 12px; line-height: 1.5; }
  .ds-author-lbl { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; color: var(--fg-3); background: var(--neutral-100); border-radius: 5px; padding: 2px 7px; flex-shrink: 0; align-self: flex-start; }
  .ds-author-t { color: var(--fg-2); }
  .ds-items { padding: 0 16px 8px; display: flex; flex-direction: column; }
  .ds-doc { display: flex; align-items: flex-start; gap: 9px; padding: 9px 0; border-top: 1px solid var(--border-1); }
  .ds-doc .dchk { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border-2); background: var(--neutral-50); color: var(--sky-600); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .ds-doc .dtxt { flex: 1; min-width: 0; font-size: 13.5px; line-height: 1.5; color: var(--fg-1); }
  .ds-mok { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0 4px 30px; font-size: 12.5px; line-height: 1.5; color: var(--fg-2); }
  .ds-mok .mbar { width: 2px; align-self: stretch; background: var(--neutral-200); border-radius: 2px; flex-shrink: 0; margin-right: 2px; }
  .ds-na-note { padding: 0 16px 14px; font-size: 13px; color: var(--fg-2); line-height: 1.55; display: flex; gap: 8px; }
  .ds-na-note svg { color: var(--warm); flex-shrink: 0; margin-top: 1px; }
  .ds-links { display: flex; flex-wrap: wrap; gap: 7px; padding: 10px 16px 14px; border-top: 1px solid var(--border-1); }
  .ds-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; border-radius: 9px; padding: 8px 12px; border: 1px solid var(--border-2); background: var(--bg-surface); color: var(--sky-700); text-decoration: none; transition: background var(--t-fast) var(--ease-out); }
  .ds-link:hover { background: var(--sky-50); }
  .ds-link svg { flex-shrink: 0; }
  /* 주신청서 양식 = 핵심 서식 강조 다운로드 */
  .ds-apply-wrap { padding: 12px 16px 4px; }
  .ds-apply { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border-radius: 11px; background: var(--sky-500); color: #fff; }
  .ds-apply svg { flex-shrink: 0; }
  .ds-apply-t { flex: 1; min-width: 0; font-size: 13.5px; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; }
  .ds-apply-dl { display: flex; gap: 6px; flex-shrink: 0; }
  .ds-apply-dl a { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; color: #fff; background: rgba(255,255,255,0.22); border-radius: 7px; padding: 4px 11px; text-decoration: none; transition: background var(--t-fast) var(--ease-out); }
  .ds-apply-dl a:hover { background: rgba(255,255,255,0.38); }
  /* 호별 별지서식 — 양식 HWP·PDF 둘 다 고르게 */
  .ds-form { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; align-self: center; margin-left: 8px; font-size: 11.5px; color: var(--fg-3); white-space: nowrap; }
  .ds-form svg { flex-shrink: 0; opacity: 0.7; }
  .ds-form em { font-style: normal; font-weight: 600; }
  .ds-form a { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; color: var(--sky-700); background: var(--sky-50); border: 1px solid var(--border-2); border-radius: 7px; padding: 2px 8px; text-decoration: none; transition: filter var(--t-fast) var(--ease-out); }
  .ds-form a:hover { filter: brightness(0.96); }
  /* 조건부(해당 시만) 접기 */
  .ds-cond { border-top: 1px solid var(--border-1); }
  .ds-cond > summary { list-style: none; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 12.5px; font-weight: 700; color: var(--fg-3); user-select: none; }
  .ds-cond > summary::-webkit-details-marker { display: none; }
  .ds-cond > summary svg { color: var(--warm); flex-shrink: 0; }
  .ds-cond > summary:hover { color: var(--fg-2); }
  .ds-cond[open] > summary { color: var(--fg-2); }
  .ds-cond .ds-items { padding-top: 0; opacity: 0.84; }
  .ds-cond .ds-doc:first-child { border-top: none; }
  /* 조건부 서류 에이전트 판정(해당/비해당/확인필요) */
  .ds-ap { display: inline-flex; align-items: center; font-size: 10px; font-weight: 800; letter-spacing: 0.03em; border-radius: 5px; padding: 1px 6px; margin-left: 7px; vertical-align: middle; white-space: nowrap; }
  .ds-ap-y { background: var(--success-bg); color: oklch(0.34 0.10 150); }
  .ds-ap-n { background: var(--neutral-100); color: var(--fg-3); }
  .ds-ap-u { background: var(--warm-bg); color: var(--warm-fg); }
  .ds-areason { font-size: 12px; color: var(--fg-3); line-height: 1.45; margin-top: 3px; }
  .ds-doc-off { opacity: 0.62; }

  /* ── 우측 패널: 상세 추론 플로우(시간순 타임라인) ── */
  .flow-list { position: relative; display: flex; flex-direction: column; }
  .flow-item { display: flex; gap: 11px; padding: 0; }
  .flow-item .fi-rail { width: 22px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .flow-item .fi-dot { width: 11px; height: 11px; border-radius: 999px; background: var(--neutral-300); margin-top: 4px; flex-shrink: 0; box-shadow: 0 0 0 3px var(--bg-page); z-index: 1; }
  .flow-item .fi-rail::after { content: ""; flex: 1; width: 2px; background: var(--border-1); margin: 2px 0 0; }
  .flow-item:last-child .fi-rail::after { display: none; }
  .flow-item .fi-main { flex: 1; min-width: 0; padding-bottom: 14px; }
  .flow-item .fi-t { font-size: 13.5px; font-weight: 700; color: var(--fg-1); letter-spacing: -0.01em; line-height: 1.4; }
  .flow-item .fi-d { font-size: 12.5px; color: var(--fg-2); line-height: 1.55; margin-top: 3px; word-break: break-word; }
  .flow-item.think .fi-dot { background: var(--sky-400); }
  .flow-item.think .fi-d { color: var(--fg-2); font-style: italic; }
  .flow-item.call .fi-dot { background: var(--sky-500); }
  .flow-item.ok .fi-dot, .flow-item.done .fi-dot { background: var(--success); }
  .flow-item.cite .fi-dot { background: var(--sky-600); }
  .flow-item.verdict .fi-dot { background: var(--warm); }
  .flow-item.na .fi-dot { background: var(--warm); }
  .flow-item .flow-link { display: inline-flex; align-items: center; gap: 4px; color: var(--sky-700); text-decoration: none; font-weight: 600; white-space: nowrap; }
  .flow-item .flow-link svg { flex-shrink: 0; }
  /* 도구 호출/결과·단계마커 = 살짝 연하게(가늠이의 판단·근거·판정이 도드라지게) */
  .flow-item.call .fi-t, .flow-item.res .fi-t, .flow-item.done .fi-t { font-weight: 600; color: var(--fg-3); }
  .flow-item.call .fi-d, .flow-item.res .fi-d { color: var(--fg-3); font-size: 12px; }
  .flow-item.call .fi-dot, .flow-item.res .fi-dot, .flow-item.done .fi-dot { opacity: 0.5; }
  .flow-item.call .fi-main, .flow-item.res .fi-main { padding-bottom: 10px; }
  /* 가늠이의 판단 = 도드라지게 */
  .flow-item.think .fi-t { font-size: 14px; color: var(--fg-1); }
  .flow-item.think .fi-dot { box-shadow: 0 0 0 3px var(--bg-page), 0 0 0 5px var(--sky-100, rgba(56,160,255,0.18)); }
  /* HITL 대화형 — 질문 아래 안내 한 줄 */
  .hitl-hint { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-1); font-size: 12px; color: var(--fg-3); display: flex; align-items: center; gap: 5px; }
  .hitl-hint svg { flex-shrink: 0; opacity: 0.7; }

  /* ── 우측 패널: 규모/부담금/주차 미니 카드 ── */
  .mini-card { padding: 16px 18px; }
  .mini-card .mini-note { display: flex; gap: 8px; font-size: 13px; line-height: 1.55; color: var(--fg-2); margin-top: 8px; }
  .mini-card .mini-note:first-of-type { margin-top: 0; }
  .mini-card .mini-note svg { color: var(--sky-500); flex-shrink: 0; margin-top: 2px; }
  .lv-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 0; border-top: 1px solid var(--border-1); }
  .lv-row:first-of-type { border-top: none; padding-top: 0; }
  .lv-row .lv-t { font-size: 14px; font-weight: 700; color: var(--fg-1); letter-spacing: -0.01em; }
  .lv-row .lv-m { font-size: 12px; color: var(--fg-3); line-height: 1.5; margin-top: 2px; }
  .lv-row .lv-amt { font-size: 14.5px; font-weight: 800; color: var(--sky-700); white-space: nowrap; flex-shrink: 0; }
  .lv-row .lv-amt.na { font-size: 12.5px; font-weight: 700; color: var(--warm-fg); }

  @media (max-width: 768px) {
    .result-panel { width: 100vw; border-left: none; }
    .answer-msg { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- 좌측 사이드바 -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-mark"></div>
      <div class="sb-title">가늠터<small>AI 건축 인허가 사전검토</small></div>
    </div>
    <button class="sb-new" id="newChat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 상담 시작
    </button>
    <div class="sb-group">상담 기록</div>
    <nav class="sb-list" id="convList"></nav>
  </aside>

  <!-- 중앙 채팅 -->
  <main class="main">
    <div class="mbar">
      <button class="mbar-btn" id="menuBtn" aria-label="메뉴 열기"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="mbar-title" id="mbarTitle">가늠터</div>
      <button class="mbar-btn hidden" id="mbarChange" aria-label="주소 변경"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button>
    </div>
    <header class="chead hidden" id="chead">
      <div class="addr"></div>
      <button class="change" id="changeAddr">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        주소 변경
      </button>
    </header>

    <div class="prail hidden" id="prail"></div>

    <div class="scroll" id="scroll"></div>

    <div class="composer-wrap hidden" id="composerWrap">
      <div class="composer">
        <div class="cmp-addr" id="cmpAddr"></div>
        <div class="cmp-box">
          <textarea id="cmpInput" rows="1" placeholder="예: 이 땅에 카페를 만들 수 있나요?"></textarea>
          <button class="cmp-send" id="cmpSend" aria-label="전송" disabled>
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="cmp-hint">AI 사전 진단은 참고용이며, 최종 허가 여부는 관할 기관 확인이 필요합니다.</div>
      </div>
    </div>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<div class="overlay" id="overlay"></div>

<!-- 우측 결과 패널 (진단 결과·서류·근거) -->
<div class="rp-backdrop" id="rpBackdrop"></div>
<aside class="result-panel" id="resultPanel" aria-hidden="true">
  <div class="rp-head">
    <div class="rp-ic" id="rpIcon"></div>
    <div class="rp-meta"><div class="rp-t" id="rpTitle">진단 결과</div><div class="rp-s" id="rpSub"></div></div>
    <button class="rp-x" id="rpClose" aria-label="결과 패널 닫기"></button>
  </div>
  <div class="rp-body" id="rpBody"></div>
</aside>

<script type="module" src="./chat.js"></script>
</body>
</html>
